services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: kb-agent-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command:
      - etcd
      - -advertise-client-urls=http://127.0.0.1:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - ./docker-data/milvus/etcd:/etcd
    networks:
      - kb-agent-net

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: kb-agent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker-data/milvus/minio:/minio_data
    networks:
      - kb-agent-net

  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: kb-agent-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./docker-data/milvus/standalone:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - kb-agent-net

networks:
  kb-agent-net:
    name: kb-agent-net
