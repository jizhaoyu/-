server:
  port: 8080

spring:
  application:
    name: knowledge-base-agent
  profiles:
    default: local
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/kb_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

app:
  storage-path: ${APP_STORAGE_PATH:${STORAGE_PATH:./data/storage}}
  openapi:
    server-url: ${APP_OPENAPI_SERVER_URL:http://localhost:${server.port}}
  ai:
    base-url: ${AI_BASE_URL:${APP_AI_BASE_URL:}}
    api-key: ${AI_API_KEY:${APP_AI_API_KEY:}}
    chat-base-url: ${AI_CHAT_BASE_URL:${APP_AI_CHAT_BASE_URL:https://api.moonshot.cn/v1}}
    chat-api-key: ${AI_CHAT_API_KEY:${APP_AI_CHAT_API_KEY:}}
    chat-model: ${AI_CHAT_MODEL:${APP_AI_CHAT_MODEL:kimi-k2.5}}
    embedding-base-url: ${AI_EMBEDDING_BASE_URL:${APP_AI_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
    embedding-api-key: ${AI_EMBEDDING_API_KEY:${APP_AI_EMBEDDING_API_KEY:}}
    embedding-model: ${AI_EMBEDDING_MODEL:${APP_AI_EMBEDDING_MODEL:text-embedding-v2}}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:${APP_AI_TIMEOUT_SECONDS:30}}
  milvus:
    enabled: ${MILVUS_ENABLED:${APP_MILVUS_ENABLED:false}}
    base-url: ${MILVUS_BASE_URL:${APP_MILVUS_BASE_URL:http://localhost:19530}}
    token: ${MILVUS_TOKEN:${APP_MILVUS_TOKEN:root:Milvus}}
    collection-name: ${MILVUS_COLLECTION_NAME:${APP_MILVUS_COLLECTION_NAME:kb_chunk}}
    vector-dimension: ${MILVUS_VECTOR_DIMENSION:${APP_MILVUS_VECTOR_DIMENSION:1536}}
  rag:
    chunk-size: ${RAG_CHUNK_SIZE:${APP_RAG_CHUNK_SIZE:800}}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:${APP_RAG_CHUNK_OVERLAP:120}}
    max-context-chunks: ${RAG_MAX_CONTEXT_CHUNKS:${APP_RAG_MAX_CONTEXT_CHUNKS:6}}
